# Server
server.port=8081

# Database - Supabase (modo desarrollo - usa tu DB de Supabase localmente)
# Reemplaza [PROJECT-REF] con el ID de tu proyecto en Supabase
spring.datasource.url=${DB_URL:jdbc:postgresql://db.icbgfdgwvtbrissgfzie.supabase.co:5432/postgres?sslmode=require&currentSchema=public}
spring.datasource.username=${DB_USER:postgres.icbgfdgwvtbrissgfzie}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate - desarrollo (permite cambios en esquema)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Logging detallado para desarrollo
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.security=DEBUG

# Transaction
spring.transaction.default-timeout=30
spring.transaction.rollback-on-commit-failure=true

# Actuator para health checks en desarrollo
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always