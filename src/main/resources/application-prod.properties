# Server - Render asigna puerto dinámicamente vía variable $PORT
server.port=${PORT:8081}

# Database - Supabase (producción - variables inyectadas por Render)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate - producción (NO modificar esquema automáticamente)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Connection Pool - optimizado para producción en Supabase
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
# SSL ya está configurado en application.properties común

# Logging - solo errores en producción
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
logging.level.com.codefactory.reservasmsauthservice=INFO

# Transaction
spring.transaction.default-timeout=30
spring.transaction.rollback-on-commit-failure=true

# Actuator - solo health básico en producción
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Security headers
server.forward-headers-strategy=framework